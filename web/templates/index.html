<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Test Page</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>GREEN-API Tester</h1>

        <div class="main-content">
            <div class="left-panel">
                <div class="card">
                    <h2>Connection Settings</h2>
                    <div class="form-group">
                        <label for="idInstance">idInstance</label>
                        <input type="text" id="idInstance" placeholder="Enter your idInstance">
                    </div>
                    <div class="form-group">
                        <label for="apiTokenInstance">ApiTokenInstance</label>
                        <input type="text" id="apiTokenInstance" placeholder="Enter your ApiTokenInstance">
                    </div>
                </div>

                <div class="card">
                    <h2>Instance Info</h2>
                    <div class="buttons-row">
                        <button class="btn" onclick="getSettings()">getSettings</button>
                        <button class="btn" onclick="getStateInstance()">getStateInstance</button>
                    </div>
                </div>

                <div class="card">
                    <h2>sendMessage</h2>
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="text" id="phoneNumber" placeholder="79001234567">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="3" placeholder="Enter your message"></textarea>
                    </div>
                    <button class="btn" onclick="sendMessage()">sendMessage</button>
                </div>

                <div class="card">
                    <h2>sendFileByUrl</h2>
                    <div class="form-group">
                        <label for="filePhoneNumber">Phone Number</label>
                        <input type="text" id="filePhoneNumber" placeholder="79001234567">
                    </div>
                    <div class="form-group">
                        <label for="fileUrl">File URL</label>
                        <input type="url" id="fileUrl" placeholder="https://example.com/file.jpg">
                    </div>
                    <div class="form-group">
                        <label for="fileName">File Name</label>
                        <input type="text" id="fileName" placeholder="file.jpg">
                    </div>
                    <div class="form-group">
                        <label for="caption">Caption (optional)</label>
                        <input type="text" id="caption" placeholder="File caption">
                    </div>
                    <button class="btn" onclick="sendFileByUrl()">sendFileByUrl</button>
                </div>
            </div>

            <div class="right-panel">
                <div class="card" style="height: 100%;">
                    <div class="response-header">
                        <h2>Response</h2>
                        <button class="btn clear-btn" onclick="clearResponse()">Clear</button>
                    </div>
                    <textarea class="response-area" id="response" readonly placeholder="API response will appear here..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
